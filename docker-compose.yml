services:

  # ─── API (Node/Express + SQLite) ───────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bunker-api
    restart: unless-stopped
    environment:
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production-2077}
      - NODE_ENV=production
    volumes:
      - bunker-data:/data
    networks:
      - bunker-net
    healthcheck:
      test: ["CMD-SHELL", "node -e \"const h=require('http');h.get('http://localhost:3001/health',r=>{process.exit(r.statusCode===200?0:1)}).on('error',()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  # ─── Frontend (Nginx + static SPA) ─────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: bunker-web
    restart: unless-stopped
    ports:
      - "${PORT:-7532}:80"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - bunker-net

  # ─── Startup Banner ─────────────────────────────────────────────────────────
  banner:
    image: alpine
    container_name: bunker-banner
    depends_on:
      web:
        condition: service_started
    networks:
      - bunker-net
    entrypoint: >
      sh -c "
        echo '';
        echo '╔══════════════════════════════════════════════╗';
        echo '║         VAULT // BUNKER COMMAND              ║';
        echo '║         System online and ready.             ║';
        echo '╠══════════════════════════════════════════════╣';
        echo '║  App URL  →  http://localhost:${PORT:-7532}  ║';
        echo '║  Username →  admin                           ║';
        echo '║  Password →  admin                           ║';
        echo '╚══════════════════════════════════════════════╝';
        echo '';
      "
    restart: "no"

volumes:
  bunker-data:
    driver: local

networks:
  bunker-net:
    driver: bridge
